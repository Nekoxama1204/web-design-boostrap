<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario de Registro</title>
<!--     <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"> -->
    <link rel="stylesheet" href="assets/css/boostrap.min.css">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

    <div class="main-container d-flex justify-content-center align-items-center min-vh-100">
        <div class="form-backdrop">
            <div class="form-card text-center">
                
                <h2 class="form-title mb-1">Formulario de Registro</h2>
                <p class="text-muted mb-4 small">Crea tu cuenta completando tus datos.</p>

                <form class="text-start">
                    <div class="mb-3">
                        <label class="form-label small fw-bold text-dark">Nombre Completo</label>
                        <div class="input-wrapper">
                            <i class="fa-solid fa-user input-icon"></i>
                            <input type="text" class="form-control custom-input active-input" value="Mateo Garcia Rios" placeholder="Nombre Completo">
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label small fw-bold text-dark">Correo Electrónico</label>
                        <div class="input-wrapper">
                            <i class="fa-solid fa-envelope input-icon"></i>
                            <input type="email" class="form-control custom-input" value="mateo.garcia@email.com" placeholder="Correo Electrónico">
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label small fw-bold text-dark">Contraseña</label>
                        <div class="input-wrapper">
                            <i class="fa-solid fa-lock input-icon"></i>
                            <input type="password" class="form-control custom-input" value="12345678" placeholder="Contraseña">
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label small fw-bold text-dark">Confirmar Contraseña</label>
                        <div class="input-wrapper">
                            <i class="fa-solid fa-lock input-icon"></i>
                            <input type="password" class="form-control custom-input" value="12345678" placeholder="Confirmar Contraseña">
                        </div>
                    </div>

                    <div class="mb-4">
                        <label class="form-label small fw-bold text-dark">Teléfono Celular</label>
                        <div class="input-wrapper">
                            <i class="fa-solid fa-mobile-screen input-icon"></i>
                            <input type="tel" class="form-control custom-input" value="+52 55 1234 5678" placeholder="Teléfono Celular">
                        </div>
                    </div>

                    <div class="form-check mb-4 small text-muted">
                        <input class="form-check-input custom-checkbox" type="checkbox" id="terms">
                        <label class="form-check-label" for="terms">
                            He leído y acepto los <a href="#" class="custom-link">Términos y Condiciones</a> y la <a href="#" class="custom-link">Política de Privacidad</a>
                        </label>
                    </div>

                    <button type="submit" class="btn btn-primary w-100 rounded-pill fw-bold py-2 mb-3 shadow-sm custom-btn">
                        REGISTRARSE
                    </button>

                    <p class="text-center small text-muted mb-0">
                        ¿Ya tienes cuenta? <a href="#" class="custom-link fw-bold">Inicia Sesión</a>
                    </p>
                </form>

            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
